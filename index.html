<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>万能麻将 - 中国麻将大全</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/themes.css">
    <link rel="stylesheet" href="css/game.css">
    <link rel="stylesheet" href="css/animations.css">
</head>
<body>
    <div id="app">
        <!-- 开场加载 -->
        <div id="loading-screen" class="loading-screen">
            <div class="loading-content">
                <div class="loading-mahjong">🀄</div>
                <div class="loading-title">万能麻将</div>
                <div class="loading-subtitle">中国境内所有麻将种类</div>
                <div class="loading-bar">
                    <div class="loading-fill"></div>
                </div>
            </div>
        </div>
        
        <!-- 主菜单 -->
        <div id="main-menu" class="screen active">
            <div class="menu-header">
                <h1 class="game-title">🀄 万能麻将</h1>
                <p class="game-subtitle">中国境内所有麻将种类</p>
            </div>
            
            <div class="menu-buttons">
                <button class="menu-btn" data-screen="game" data-mode="ai">
                    <span class="btn-icon">🤖</span>
                    <span class="btn-text">人机对战</span>
                    <span class="btn-desc">1人 vs AI</span>
                </button>
                <button class="menu-btn" data-screen="network-lobby" data-mode="lan">
                    <span class="btn-icon">🌐</span>
                    <span class="btn-text">局域网联机</span>
                    <span class="btn-desc">多人P2P对战</span>
                </button>
                <button class="menu-btn" data-screen="custom-mode" data-mode="custom">
                    <span class="btn-icon">⚙️</span>
                    <span class="btn-text">自定义模式</span>
                    <span class="btn-desc">自定义规则与牌局</span>
                </button>
                <button class="menu-btn" data-screen="replay-list" data-mode="replay">
                    <span class="btn-icon">📹</span>
                    <span class="btn-text">牌局回放</span>
                    <span class="btn-desc">查看历史对局</span>
                </button>
                <button class="menu-btn" data-screen="achievements" data-mode="achievements">
                    <span class="btn-icon">🏆</span>
                    <span class="btn-text">成就</span>
                    <span class="btn-desc">查看解锁进度</span>
                </button>
            </div>
            
            <!-- 统计面板 -->
            <div class="stats-panel">
                <div class="stats-header">
                    <span class="level-badge">Lv.<span id="player-level">1</span></span>
                    <span class="exp-text"><span id="current-exp">0</span>/<span id="max-exp">100</span> EXP</span>
                </div>
                <div class="exp-bar">
                    <div class="exp-fill" id="exp-fill" style="width: 0%"></div>
                </div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-value" id="stat-total-games">0</span>
                        <span class="stat-label">总局数</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value win" id="stat-wins">0</span>
                        <span class="stat-label">胜场</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value lose" id="stat-losses">0</span>
                        <span class="stat-label">负场</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="stat-winrate">0%</span>
                        <span class="stat-label">胜率</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="stat-streak">0/<span id="stat-max-streak">0</span></span>
                        <span class="stat-label">连胜/最高</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="stat-total-score">0</span>
                        <span class="stat-label">总得分</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="stat-best-game">0</span>
                        <span class="stat-label">最高单局</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-value" id="stat-most-bombs">0</span>
                        <span class="stat-label">最多炸弹</span>
                    </div>
                </div>
                <button class="reset-stats-btn" id="reset-stats">重置记录</button>
            </div>
            
            <!-- 基础设置 -->
            <div class="settings-section">
                <h3 class="settings-title">基础设置</h3>
                <div class="settings-grid">
                    <div class="setting-item">
                        <label>玩家名称</label>
                        <input type="text" id="player-name" value="玩家" maxlength="8">
                    </div>
                    <div class="setting-item">
                        <label>AI难度</label>
                        <select id="ai-difficulty">
                            <option value="easy">简单</option>
                            <option value="normal" selected>普通</option>
                            <option value="hard">困难</option>
                            <option value="expert">专家</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label>牌桌主题</label>
                        <select id="table-theme">
                            <option value="classic-green" selected>经典绿</option>
                            <option value="dark-blue">深海蓝</option>
                            <option value="wood">原木色</option>
                            <option value="red">中国红</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label>局数</label>
                        <select id="game-rounds">
                            <option value="1" selected>1局</option>
                            <option value="4">4局</option>
                            <option value="8">8局</option>
                            <option value="16">16局</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label>游戏速度</label>
                        <select id="game-speed">
                            <option value="slow">慢速</option>
                            <option value="normal" selected>正常</option>
                            <option value="fast">快速</option>
                            <option value="instant">瞬间</option>
                        </select>
                    </div>
                    <div class="setting-item">
                        <label>界面密度</label>
                        <select id="ui-density">
                            <option value="compact">紧凑</option>
                            <option value="comfortable" selected>舒适</option>
                            <option value="spacious">宽松</option>
                        </select>
                    </div>
                </div>
                <div class="slider-settings">
                    <div class="slider-item">
                        <label>BGM</label>
                        <input type="range" id="bgm-volume" min="0" max="100" value="50">
                        <span class="slider-value" id="bgm-value">50%</span>
                    </div>
                    <div class="slider-item">
                        <label>SFX</label>
                        <input type="range" id="sfx-volume" min="0" max="100" value="50">
                        <span class="slider-value" id="sfx-value">50%</span>
                    </div>
                </div>
                
                <!-- 体验调校 -->
                <div class="advanced-settings">
                    <h3 class="settings-title toggle" id="advanced-toggle">
                        <span>▼</span> 体验调校
                    </h3>
                    <div class="advanced-content" id="advanced-content">
                        <div class="settings-grid">
                            <div class="setting-item">
                                <label>动画强度</label>
                                <select id="animation-level">
                                    <option value="minimal">极简</option>
                                    <option value="normal" selected>正常</option>
                                    <option value="rich">丰富</option>
                                </select>
                            </div>
                            <div class="setting-item">
                                <label>对手牌显示</label>
                                <select id="opponent-display">
                                    <option value="hidden">隐藏</option>
                                    <option value="small" selected>小牌堆</option>
                                    <option value="full">完整显示</option>
                                </select>
                            </div>
                            <div class="setting-item">
                                <label>音效开关</label>
                                <select id="sfx-enabled">
                                    <option value="true" selected>开启</option>
                                    <option value="false">关闭</option>
                                </select>
                            </div>
                            <div class="setting-item">
                                <label>BGM风格</label>
                                <select id="bgm-style">
                                    <option value="calm" selected>悠然</option>
                                    <option value="upbeat">轻快</option>
                                    <option value="zen">禅意</option>
                                </select>
                            </div>
                            <div class="setting-item">
                                <label>显示牌名</label>
                                <select id="show-tile-names">
                                    <option value="false" selected>关闭</option>
                                    <option value="true">开启</option>
                                </select>
                            </div>
                            <div class="setting-item">
                                <label>自动理牌</label>
                                <select id="auto-sort">
                                    <option value="true" selected>开启</option>
                                    <option value="false">关闭</option>
                                </select>
                            </div>
                        </div>
                        <div class="slider-settings">
                            <div class="slider-item">
                                <label>牌桌缩放</label>
                                <input type="range" id="table-zoom" min="70" max="130" value="100">
                                <span class="slider-value" id="table-zoom-value">100%</span>
                            </div>
                            <div class="slider-item">
                                <label>手牌大小</label>
                                <input type="range" id="hand-size" min="70" max="130" value="100">
                                <span class="slider-value" id="hand-size-value">100%</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 游戏界面 -->
        <div id="game-screen" class="screen">
            <div class="game-table" id="game-table">
                <!-- 顶部玩家（对家） -->
                <div class="player-area top" id="player-top">
                    <div class="player-info">
                        <div class="player-avatar">🤖</div>
                        <div class="player-name">AI-对家</div>
                        <div class="player-score">1000</div>
                    </div>
                    <div class="hand-area" id="hand-top"></div>
                    <div class="melds-area" id="melds-top"></div>
                </div>
                
                <!-- 左侧玩家（上家） -->
                <div class="player-area left" id="player-left">
                    <div class="player-info">
                        <div class="player-avatar">🤖</div>
                        <div class="player-name">AI-上家</div>
                        <div class="player-score">1000</div>
                    </div>
                    <div class="hand-area" id="hand-left"></div>
                    <div class="melds-area" id="melds-left"></div>
                </div>
                
                <!-- 右侧玩家（下家） -->
                <div class="player-area right" id="player-right">
                    <div class="player-info">
                        <div class="player-avatar">🤖</div>
                        <div class="player-name">AI-下家</div>
                        <div class="player-score">1000</div>
                    </div>
                    <div class="hand-area" id="hand-right"></div>
                    <div class="melds-area" id="melds-right"></div>
                </div>
                
                <!-- 底部玩家（自己） -->
                <div class="player-area bottom" id="player-bottom">
                    <div class="hand-area" id="hand-bottom"></div>
                    <div class="melds-area" id="melds-bottom"></div>
                    <div class="player-info">
                        <div class="player-avatar">👤</div>
                        <div class="player-name" id="self-name">玩家</div>
                        <div class="player-score" id="self-score">1000</div>
                    </div>
                </div>
                
                <!-- 牌桌中心 -->
                <div class="table-center">
                    <div class="discard-pile" id="discard-pile"></div>
                    <div class="deck-info">
                        <span id="deck-count">剩余: 84</span>
                        <div class="wind-indicator" id="wind-indicator">东</div>
                        <div class="round-info" id="round-info">1/4局</div>
                    </div>
                </div>
                
                <!-- 操作按钮 -->
                <div class="action-bar" id="action-bar">
                    <button class="action-btn" id="btn-chi" disabled>吃</button>
                    <button class="action-btn" id="btn-peng" disabled>碰</button>
                    <button class="action-btn" id="btn-gang" disabled>杠</button>
                    <button class="action-btn" id="btn-hu" disabled>胡</button>
                    <button class="action-btn secondary" id="btn-skip">跳过</button>
                </div>
            </div>
            
            <!-- 游戏控制栏 -->
            <div class="game-controls">
                <button class="control-btn" id="btn-menu">☰ 菜单</button>
                <button class="control-btn" id="btn-settings">⚙️ 设置</button>
                <button class="control-btn" id="btn-exit">✕ 退出</button>
            </div>
        </div>
        
        <!-- 局域网联机大厅 -->
        <div id="network-lobby" class="screen">
            <div class="lobby-header">
                <h2>🌐 局域网联机</h2>
                <button class="back-btn" data-screen="main-menu">← 返回</button>
            </div>
            <div class="lobby-content">
                <div class="room-section">
                    <h3>创建房间</h3>
                    <div class="room-config">
                        <label>房间名称</label>
                        <input type="text" id="room-name" value="我的麻将房" maxlength="12">
                        <label>麻将种类</label>
                        <select id="room-mahjong-type">
                            <option value="guangdong">广东麻将</option>
                            <option value="sichuan">四川麻将</option>
                            <option value="shanghai">上海麻将</option>
                        </select>
                        <button class="primary-btn" id="create-room">创建房间</button>
                    </div>
                </div>
                <div class="room-section">
                    <h3>加入房间</h3>
                    <div class="room-list" id="room-list">
                        <div class="empty-state">正在搜索局域网房间...</div>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 自定义模式 -->
        <div id="custom-mode" class="screen">
            <div class="lobby-header">
                <h2>⚙️ 自定义模式</h2>
                <button class="back-btn" data-screen="main-menu">← 返回</button>
            </div>
            <div class="custom-content">
                <div class="rule-section">
                    <h3>选择麻将种类</h3>
                    <div class="mahjong-types" id="mahjong-types"></div>
                </div>
                <div class="rule-section">
                    <h3>规则设置</h3>
                    <div class="rule-options" id="rule-options"></div>
                </div>
                <button class="primary-btn" id="start-custom">开始游戏</button>
            </div>
        </div>
        
        <!-- 回放列表 -->
        <div id="replay-list" class="screen">
            <div class="lobby-header">
                <h2>📹 牌局回放</h2>
                <button class="back-btn" data-screen="main-menu">← 返回</button>
            </div>
            <div class="replay-list" id="replay-container">
                <div class="empty-state">暂无历史对局</div>
            </div>
        </div>
        
        <!-- 成就界面 -->
        <div id="achievements" class="screen">
            <div class="lobby-header">
                <h2>🏆 成就</h2>
                <button class="back-btn" data-screen="main-menu">← 返回</button>
            </div>
            <div class="achievements-grid" id="achievements-grid"></div>
        </div>
        
        <!-- 游戏内菜单 -->
        <div id="ingame-menu" class="modal hidden">
            <div class="modal-content">
                <h3>游戏菜单</h3>
                <button class="modal-btn" id="btn-resume">继续游戏</button>
                <button class="modal-btn" id="btn-restart">重新开始</button>
                <button class="modal-btn" id="btn-exit-game">退出到主菜单</button>
            </div>
        </div>
        
        <!-- 提示框 -->
        <div id="toast-container"></div>
        
        <!-- 粒子特效层 -->
        <div id="particle-container"></div>
        
        <!-- 胡牌彩虹光效层 -->
        <div id="rainbow-overlay" class="rainbow-glow"></div>
        
        <!-- 视差背景 -->
        <div class="parallax-bg"></div>
    </div>
    
    <!-- 脚本加载 -->
    <script src="js/utils/helpers.js"></script>
    <script src="js/core/tiles.js"></script>
    <script src="js/core/rules.js"></script>
    <script src="js/core/player.js"></script>
    <script src="js/core/engine.js"></script>
    <script src="js/ai/ai-player.js"></script>
    <script src="js/network/p2p.js"></script>
    <script src="js/data/storage.js"></script>
    <script src="js/data/stats.js"></script>
    <script src="js/data/replay.js"></script>
    <script src="js/audio/audio-manager.js"></script>
    <script src="js/ui/components.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
